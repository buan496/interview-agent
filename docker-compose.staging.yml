name: interview-agent-staging

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interview_agent_staging}
      POSTGRES_USER: ${POSTGRES_USER:-interview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-__CHANGE_ME_STAGING_POSTGRES_PASSWORD__}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interview} -d ${POSTGRES_DB:-interview_agent_staging}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: ${API_IMAGE:-interview-agent-api:${IMAGE_TAG:-staging-local}}
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: staging
      SERVICE_NAME: ${SERVICE_NAME:-Interview Agent Staging}
      API_PREFIX: ${API_PREFIX:-/api}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://interview:__CHANGE_ME_STAGING_POSTGRES_PASSWORD__@postgres:5432/interview_agent_staging}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_CONNECT_TIMEOUT_SECONDS: ${REDIS_CONNECT_TIMEOUT_SECONDS:-2}
      REDIS_SOCKET_TIMEOUT_SECONDS: ${REDIS_SOCKET_TIMEOUT_SECONDS:-2}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      REQUEST_ID_HEADER: ${REQUEST_ID_HEADER:-X-Request-ID}
      AUTH_DEV_CODE_ENABLED: ${AUTH_DEV_CODE_ENABLED:-false}
      AUTH_DEV_CODE: ${AUTH_DEV_CODE:-__DISABLED_IN_STAGING__}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-__CHANGE_ME_STAGING_JWT_SECRET__}
      SMS_PROVIDER_KEY: ${SMS_PROVIDER_KEY:-}
      ADMIN_PHONES: ${ADMIN_PHONES:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      LLM_PRICING_VERSION: ${LLM_PRICING_VERSION:-llm-pricing-v1-2026-07}
      LLM_GATEWAY_ENABLED: ${LLM_GATEWAY_ENABLED:-true}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-deepseek}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-deepseek-chat}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-mock}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-local-fallback}
      LLM_ROUTE_INTERVIEW_SCORING: ${LLM_ROUTE_INTERVIEW_SCORING:-deepseek/deepseek-chat}
      LLM_ROUTE_REPORT_SUMMARY: ${LLM_ROUTE_REPORT_SUMMARY:-}
      LLM_ROUTE_MEMORY_REFRESH: ${LLM_ROUTE_MEMORY_REFRESH:-}
      LLM_ROUTE_RUBRIC_VALIDATION: ${LLM_ROUTE_RUBRIC_VALIDATION:-}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-1}
      LLM_USAGE_METERING_ENABLED: ${LLM_USAGE_METERING_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      REDIS_RATE_LIMIT_PREFIX: ${REDIS_RATE_LIMIT_PREFIX:-interview-agent:staging:rate-limit}
      LOGIN_RATE_LIMIT_PER_MINUTE: ${LOGIN_RATE_LIMIT_PER_MINUTE:-120}
      AUTH_PHONE_RATE_LIMIT_PER_HOUR: ${AUTH_PHONE_RATE_LIMIT_PER_HOUR:-20}
      ANSWER_SUBMIT_RATE_LIMIT_PER_MINUTE: ${ANSWER_SUBMIT_RATE_LIMIT_PER_MINUTE:-60}
      LLM_DAILY_TOKEN_QUOTA: ${LLM_DAILY_TOKEN_QUOTA:-1000000}
      LLM_MONTHLY_TOKEN_QUOTA: ${LLM_MONTHLY_TOKEN_QUOTA:-10000000}
      LLM_DAILY_CALL_QUOTA: ${LLM_DAILY_CALL_QUOTA:-1000}
      CACHE_BACKEND: ${CACHE_BACKEND:-redis}
      CACHE_PREFIX: ${CACHE_PREFIX:-interview-agent:staging:cache}
      ASYNC_JOBS_ENABLED: ${ASYNC_JOBS_ENABLED:-true}
      ASYNC_JOB_BACKEND: ${ASYNC_JOB_BACKEND:-redis}
      ASYNC_JOB_QUEUE_NAME: ${ASYNC_JOB_QUEUE_NAME:-interview-agent:staging:async-jobs}
      ASYNC_JOB_MAX_ATTEMPTS: ${ASYNC_JOB_MAX_ATTEMPTS:-3}
      ASYNC_JOB_WORKER_POLL_SECONDS: ${ASYNC_JOB_WORKER_POLL_SECONDS:-2}
      WHISPER_API_KEY: ${WHISPER_API_KEY:-}
      WHISPER_BASE_URL: ${WHISPER_BASE_URL:-https://api.siliconflow.cn/v1}
      WHISPER_MODEL: ${WHISPER_MODEL:-FunAudioLLM/SenseVoiceSmall}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.ingest.seed_loader app/ingest/questions_seed.jsonl &&
             python -m app.ingest.seed_loader app/ingest/questions_real.jsonl &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    image: ${API_IMAGE:-interview-agent-api:${IMAGE_TAG:-staging-local}}
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      APP_ENV: staging
      SERVICE_NAME: ${SERVICE_NAME:-Interview Agent Staging Worker}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://interview:__CHANGE_ME_STAGING_POSTGRES_PASSWORD__@postgres:5432/interview_agent_staging}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_CONNECT_TIMEOUT_SECONDS: ${REDIS_CONNECT_TIMEOUT_SECONDS:-2}
      REDIS_SOCKET_TIMEOUT_SECONDS: ${REDIS_SOCKET_TIMEOUT_SECONDS:-2}
      AUTH_DEV_CODE_ENABLED: ${AUTH_DEV_CODE_ENABLED:-false}
      AUTH_DEV_CODE: ${AUTH_DEV_CODE:-__DISABLED_IN_STAGING__}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-__CHANGE_ME_STAGING_JWT_SECRET__}
      ADMIN_PHONES: ${ADMIN_PHONES:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      LLM_PRICING_VERSION: ${LLM_PRICING_VERSION:-llm-pricing-v1-2026-07}
      LLM_GATEWAY_ENABLED: ${LLM_GATEWAY_ENABLED:-true}
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-deepseek}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-deepseek-chat}
      LLM_FALLBACK_ENABLED: ${LLM_FALLBACK_ENABLED:-true}
      LLM_FALLBACK_PROVIDER: ${LLM_FALLBACK_PROVIDER:-mock}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-local-fallback}
      LLM_USAGE_METERING_ENABLED: ${LLM_USAGE_METERING_ENABLED:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_BACKEND: ${RATE_LIMIT_BACKEND:-redis}
      REDIS_RATE_LIMIT_PREFIX: ${REDIS_RATE_LIMIT_PREFIX:-interview-agent:staging:rate-limit}
      CACHE_BACKEND: ${CACHE_BACKEND:-redis}
      CACHE_PREFIX: ${CACHE_PREFIX:-interview-agent:staging:cache}
      ASYNC_JOBS_ENABLED: ${ASYNC_JOBS_ENABLED:-true}
      ASYNC_JOB_BACKEND: ${ASYNC_JOB_BACKEND:-redis}
      ASYNC_JOB_QUEUE_NAME: ${ASYNC_JOB_QUEUE_NAME:-interview-agent:staging:async-jobs}
      ASYNC_JOB_MAX_ATTEMPTS: ${ASYNC_JOB_MAX_ATTEMPTS:-3}
      ASYNC_JOB_WORKER_POLL_SECONDS: ${ASYNC_JOB_WORKER_POLL_SECONDS:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.worker

  frontend:
    image: ${FRONTEND_IMAGE:-interview-agent-frontend:${IMAGE_TAG:-staging-local}}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_staging_data:
  redis_staging_data:
